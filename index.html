<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학생 실천 기록 관리 시스템 v3</title>
    <style>
        :root { --primary: #4a90e2; --teacher: #2c3e50; --bg: #f0f2f5; --danger: #e74c3c; --success: #27ae60; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 1100px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .login-box, .app-content { display: none; }
        .active { display: block; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 13px; }
        th { background: #f8f9fa; }
        
        button { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; color: white; font-weight: bold; }
        .btn-primary { background: var(--primary); }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        .btn-gray { background: #6c757d; }

        .student-card { margin-bottom: 30px; border: 1px solid #e1e4e8; border-radius: 10px; overflow: hidden; position: relative; }
        .student-header { background: var(--teacher); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .today-highlight { background: #fff9db; border: 2px solid #fab005 !important; }
        .note-text { color: #666; font-style: italic; display: block; margin-top: 5px; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPage" class="login-box active">
        <h2 style="text-align:center;">🏫 스마트 실천 계획표</h2>
        <div style="display:flex; flex-direction:column; gap:10px; max-width:300px; margin: 0 auto;">
            <input type="text" id="userId" placeholder="이름 (관리자는 '선생님')" style="padding:10px;">
            <input type="password" id="userPw" placeholder="비밀번호 (초기: 1234)" style="padding:10px;">
            <button class="btn-primary" onclick="login()">로그인</button>
        </div>
    </div>

    <div id="studentPage" class="app-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="welcomeMsg"></h2>
            <button class="btn-gray" onclick="logout()">로그아웃</button>
        </div>
        <div style="margin: 20px 0; display:flex; gap:10px;">
            <input type="text" id="newTask" placeholder="새 실천 목표 추가" style="flex:1; padding:10px;">
            <button class="btn-primary" onclick="addTask()">추가</button>
        </div>
        <table id="studentTable"><thead id="studentHead"></thead><tbody id="studentBody"></tbody></table>
        
        <div style="margin-top:30px; padding:15px; background:#f8f9fa; border-radius:8px;">
            <h4>🔐 비밀번호 변경</h4>
            <input type="password" id="newPw" placeholder="새 비밀번호" style="padding:8px;">
            <button class="btn-gray" onclick="changePassword()">변경하기</button>
        </div>
    </div>

    <div id="teacherPage" class="app-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>👨‍🏫 관리자 대시보드</h2>
            <button class="btn-gray" onclick="logout()">로그아웃</button>
        </div>
        <div id="teacherView"></div>
    </div>
</div>

<script>
    const todayStr = new Date().toISOString().split('T')[0];
    let currentUser = "";

    function getWeek() {
        let arr = [];
        for(let i=0; i<7; i++) {
            let d = new Date(); d.setDate(d.getDate() + i);
            arr.push(d.toISOString().split('T')[0]);
        }
        return arr;
    }
    const weekDates = getWeek();

    function getDB() { return JSON.parse(localStorage.getItem('eduSys_v3')) || { users: {}, passwords: {} }; }
    function saveDB(db) { localStorage.setItem('eduSys_v3', JSON.stringify(db)); }

    function login() {
        const id = document.getElementById('userId').value;
        const pw = document.getElementById('userPw').value;
        const db = getDB();
        if(!id) return alert("이름을 입력하세요.");
        if(!db.passwords[id]) db.passwords[id] = "1234";
        if(db.passwords[id] !== pw) return alert("비밀번호가 틀립니다.");

        currentUser = id;
        document.getElementById('loginPage').classList.remove('active');
        if(id === "선생님") renderTeacherView(); else renderStudentView();
    }

    // --- 학생용 로직 ---
    function renderStudentView() {
        document.getElementById('studentPage').classList.add('active');
        document.getElementById('welcomeMsg').innerText = `👋 ${currentUser} 학생`;
        let headHtml = `<tr><th>목표</th>`;
        weekDates.forEach(d => headHtml += `<th class="${d===todayStr?'today-highlight':''}">${d.slice(5)}</th>`);
        document.getElementById('studentHead').innerHTML = headHtml + `</tr>`;

        const db = getDB();
        const tasks = db.users[currentUser] || [];
        let bodyHtml = "";
        tasks.forEach((t, tIdx) => {
            bodyHtml += `<tr><td><strong>${t.title}</strong></td>`;
            weekDates.forEach(d => {
                const rec = t.records[d] || {done:false, note:""};
                const isToday = d === todayStr;
                bodyHtml += `<td class="${isToday?'today-highlight':''}">
                    <input type="checkbox" ${rec.done?'checked':''} ${!isToday?'disabled':''} onchange="updateRecord(${tIdx},'${d}','done',this.checked)">
                    <br><input type="text" value="${rec.note}" ${!isToday?'disabled':''} style="width:70px; font-size:10px;" onblur="updateRecord(${tIdx},'${d}','note',this.value)">
                </td>`;
            });
            bodyHtml += `</tr>`;
        });
        document.getElementById('studentBody').innerHTML = bodyHtml || `<tr><td colspan="8">목표를 등록해 주세요.</td></tr>`;
    }

    function updateRecord(tIdx, date, field, val) {
        const db = getDB();
        if(!db.users[currentUser][tIdx].records[date]) db.users[currentUser][tIdx].records[date] = {done:false, note:""};
        db.users[currentUser][tIdx].records[date][field] = val;
        saveDB(db);
    }

    function addTask() {
        const val = document.getElementById('newTask').value; if(!val) return;
        const db = getDB(); if(!db.users[currentUser]) db.users[currentUser] = [];
        db.users[currentUser].push({title:val, records:{}});
        saveDB(db); document.getElementById('newTask').value = ""; renderStudentView();
    }

    function changePassword() {
        const np = document.getElementById('newPw').value; if(np.length < 2) return alert("새 비밀번호를 입력하세요.");
        const db = getDB(); db.passwords[currentUser] = np; saveDB(db); alert("변경되었습니다.");
    }

    // --- 교사용(관리자) 로직 ---
    function renderTeacherView() {
        document.getElementById('teacherPage').classList.add('active');
        const db = getDB();
        const view = document.getElementById('teacherView');
        let html = "";
        const students = Object.keys(db.users).filter(n => n !== "선생님");

        if(students.length === 0) { view.innerHTML = "<p style='text-align:center; padding:50px;'>등록된 학생이 없습니다.</p>"; return; }

        students.forEach(name => {
            html += `
            <div class="student-card">
                <div class="student-header">
                    <span>👤 <strong>${name}</strong> 학생</span>
                    <div>
                        <button class="btn-success" style="font-size:11px;" onclick="resetPw('${name}')">비번초기화</button>
                        <button class="btn-danger" style="font-size:11px;" onclick="deleteAccount('${name}')">계정삭제</button>
                    </div>
                </div>
                <table>
                    <thead><tr><th>목표</th>${weekDates.map(d => `<th>${d.slice(5)}</th>`).join('')}</tr></thead>
                    <tbody>
                        ${db.users[name].map(t => `
                            <tr>
                                <td>${t.title}</td>
                                ${weekDates.map(d => {
                                    const r = t.records[d] || {done:false, note:""};
                                    return `<td>${r.done?'✅':'❌'}<br><span class="note-text">${r.note||'-'}</span></td>`;
                                }).join('')}
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>`;
        });
        view.innerHTML = html;
    }

    function resetPw(name) {
        if(!confirm(`${name} 학생의 비밀번호를 1234로 초기화할까요?`)) return;
        const db = getDB(); db.passwords[name] = "1234"; saveDB(db); alert("초기화되었습니다.");
    }

    function deleteAccount(name) {
        if(!confirm(`${name} 학생의 모든 데이터와 계정을 삭제하시겠습니까? 복구할 수 없습니다.`)) return;
        const db = getDB();
        delete db.users[name];
        delete db.passwords[name];
        saveDB(db);
        renderTeacherView();
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
